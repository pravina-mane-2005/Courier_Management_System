<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courier Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f4f4;

}
/* Sidebar */

.sidebar{
    width:240px;
    background:#0d6efd;
    color:white;
    min-height:100vh;
    padding:20px;
    box-shadow:2px 0 8px rgba(0,0,0,0.1);
}

.sidebar h4{
    margin-bottom:30px;
    font-weight:700;       /* Bold heading */
    font-size:22px;        /* Increase size of heading */
}

.sidebar a{
    display:block;
    color:white;
    padding:10px 12px;
    text-decoration:none;
    border-radius:6px;
    margin-bottom:8px;
    transition:0.3s;
    font-size:16px;        /* Bigger text for links */
    font-weight:600;       /* Bold links */
}

.sidebar a:hover{
    background:#0b5ed7;
}

.sidebar .active{
    background:#084298;
}
.main{
flex:1;
padding:30px;
}

table{
background:white;
}

</style>

</head>

<body>

<div class="d-flex">

<div class="sidebar">

<h4>Admin Panel
</h4>

<a href="dashboard.html">Dashboard</a> <a href="user-management.html">Users</a><a href="courier-management.html">Courier Management</a> <a href="courier-tracking.html">Courier Tracking</a>  <a href="delivery-staff.html">Staff</a> <a href="payements.html">Payments</a> 

</div>

<div class="main">

<h3 class="mb-4">Courier Management</h3>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Tracking</th>
<th>Sender</th>
<th>Receiver</th>
<th>Source</th>
<th>Destination</th>
<th>Weight</th>
<th>Price</th>
<th>Type</th>
<th>Status</th>
<th>Created</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="couriers-table">

<tr>
<td colspan="12">Loading...</td>
</tr>

</tbody>

</table>

</div>

</div>

<!-- Update Modal -->

<div class="modal fade" id="updateModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>Update Courier</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="hidden" id="trackingNumber">

<label>Status</label> <select class="form-control mb-3" id="status">

<option value="Picked Up">Picked Up</option>
<option value="In Transit">In Transit</option>
<option value="Out for Delivery">Out for Delivery</option>
<option value="Delivered">Delivered</option>
</select>

<label>Assign Delivery Staff</label>

<select class="form-control" id="staff">
<option value="">Select Staff</option>
</select>

</div>

<div class="modal-footer">
<button class="btn btn-primary" onclick="saveUpdate()">Save</button>
</div>

</div>
</div>
</div>

<script>

const baseURL="http://localhost:8085/api";

loadCouriers();

function loadCouriers(){

fetch(`${baseURL}/couriers/all`)
.then(res=>res.json())
.then(couriers=>{

const tbody=document.getElementById("couriers-table");
tbody.innerHTML="";

if(couriers.length===0){
tbody.innerHTML="<tr><td colspan='12'>No couriers found</td></tr>";
return;
}

couriers.forEach(c=>{

tbody.innerHTML+=`

<tr>

<td>${c.id}</td>
<td>${c.trackingNumber}</td>
<td>${c.sender ? c.sender.name : ""}</td>
<td>${c.receiverName}</td>
<td>${c.sourceAddress}</td>
<td>${c.destinationAddress}</td>
<td>${c.weight}</td>
<td>₹${c.price}</td>
<td>${c.courierType}</td>
<td>${c.status}</td>
<td>${c.createdAt ? new Date(c.createdAt).toLocaleString() : ""}</td>

<td>

<button class="btn btn-warning btn-sm"
onclick="openUpdateForm('${c.trackingNumber}')">
Update
</button>

<button class="btn btn-info btn-sm"
onclick="trackCourier('${c.trackingNumber}')">
Track
</button>

<button class="btn btn-secondary btn-sm"
onclick="cancelCourier('${c.trackingNumber}')">
Cancel
</button>

</td>

</tr>

`;

});

});

}


function trackCourier(tracking){

fetch(`${baseURL}/tracking/${tracking}`)
.then(res=>res.json())
.then(data=>{

let msg="Tracking History\n\n";

data.forEach(t=>{
msg+=t.location+" - "+t.status+"\n";
});

alert(msg);

})
.catch(err=>alert("Tracking not found"));

}


function openUpdateForm(tracking){

document.getElementById("trackingNumber").value=tracking;

loadStaff();

var modal=new bootstrap.Modal(document.getElementById("updateModal"));
modal.show();

}


function loadStaff(){

fetch(`${baseURL}/staff`)
.then(res=>res.json())
.then(data=>{

let staff=document.getElementById("staff");

staff.innerHTML="<option value=''>Select Staff</option>";

data.forEach(s=>{
staff.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
});

});

}


function saveUpdate(){

let tracking=document.getElementById("trackingNumber").value;
let status=document.getElementById("status").value;
let staffId=document.getElementById("staff").value;

fetch(`${baseURL}/tracking/update`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

status:status,

courier:{
trackingNumber:tracking,
staff:{
id:staffId
}
}

})

})

.then(res=>res.json())
.then(data=>{
alert("Courier Updated");
location.reload();
})
.catch(err=>alert("Update failed"));

}

function cancelCourier(tracking) {
    if(!confirm("Cancel this courier?")) return;

    fetch(`${baseURL}/couriers/tracking/cancel/${tracking}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" }
    })
    .then(res => {
        if(!res.ok) throw new Error("Cancel failed");
        return res.json();
    })
    .then(data => {
        alert(`Courier ${data.trackingNumber} Cancelled!`);
        loadCouriers(); // reload table to show updated status
    })
    .catch(err => {
        console.error(err);
        alert("Cancel failed!");
    });
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
