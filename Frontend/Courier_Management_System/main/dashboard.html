<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Courier Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{background:#f0f2f5;}

.sidebar{
width:240px;
background:#0d6efd;
color:white;
min-height:100vh;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
border-radius:6px;
margin-bottom:8px;
font-weight:600;
}

.sidebar a:hover{background:#0b5ed7;}

.main-content{
flex:1;
padding:20px;
}

.card{
cursor:pointer;
border:none;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.table-container{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.badge-delivered{background:#28a745;color:white;}
.badge-inprogress{background:#17a2b8;color:white;}
.badge-pending{background:#ffc107;color:black;}

</style>
</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->

<div class="sidebar">

<h4>Admin Panel</h4>

<a href="dashboard.html">Dashboard</a>
<a href="user-management.html">Users</a>
<a href="courier-management.html">Courier Management</a>
<a href="courier-tracking.html">Courier Tracking</a>
<a href="delivery-staff.html">Staff</a>
<a href="payments.html">Payments</a>

</div>


<!-- MAIN CONTENT -->

<div class="main-content">

<h3>Dashboard Overview</h3>

<div class="row mt-4">

<div class="col-md-3">

<div class="card text-white bg-primary text-center" onclick="loadUsers()">

<div class="card-body">
<h5>Total Users</h5>
<p id="total-users">0</p>
</div>

</div>

</div>


<div class="col-md-3">

<div class="card text-white bg-success text-center" onclick="loadAllCouriers()">

<div class="card-body">
<h5>Total Couriers</h5>
<p id="total-couriers">0</p>
</div>

</div>

</div>


<div class="col-md-3">

<div class="card text-white bg-warning text-center" onclick="loadAssignedCouriers()">

<div class="card-body">
<h5>Pending Couriers</h5>
<p id="pending-couriers">0</p>
</div>

</div>

</div>


<div class="col-md-3">

<div class="card text-white bg-info text-center" onclick="loadBookedCouriers()">

<div class="card-body">
<h5>In Progress</h5>
<p id="inprogress-couriers">0</p>
</div>

</div>

</div>

</div>


<!-- TABLE -->

<div class="table-container">

<h5>Activity</h5>

<table class="table table-hover" id="activityTable">

<thead class="table-light">

<tr>
<th>Tracking</th>
<th>Sender</th>
<th>Receiver</th>
<th>Status</th>
<th>Date</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>



<script>

const API="http://localhost:8085/api"

async function loadDashboard(){

const users=await fetch(API+"/users").then(res=>res.json())
document.getElementById("total-users").innerText=users.length

const couriers=await fetch(API+"/couriers/all").then(res=>res.json())

document.getElementById("total-couriers").innerText=couriers.length

const pending=couriers.filter(c=>c.staff!=null)
document.getElementById("pending-couriers").innerText=pending.length

const progress=couriers.filter(c=>c.staff==null)
document.getElementById("inprogress-couriers").innerText=progress.length

loadAllCouriers()

}



async function loadAllCouriers(){

const couriers=await fetch(API+"/couriers/all").then(res=>res.json())

document.getElementById("total-couriers").innerText=couriers.length

const tbody=document.querySelector("#activityTable tbody")

tbody.innerHTML=""

document.querySelector("#activityTable thead").innerHTML=`

<tr>
<th>Tracking</th>
<th>Sender</th>
<th>Receiver</th>
<th>Status</th>
<th>Date</th>
</tr>

`

couriers.forEach(c=>{

const badge=
c.status==="Delivered"?"badge-delivered":
c.status==="In Progress"?"badge-inprogress":
"badge-pending"

tbody.innerHTML+=`

<tr>

<td>${c.trackingNumber}</td>
<td>${c.sender?c.sender.name:"N/A"}</td>
<td>${c.receiverName}</td>
<td><span class="${badge} p-1 rounded">${c.status}</span></td>
<td>${new Date(c.createdAt).toLocaleDateString()}</td>

</tr>

`

})

}



async function loadUsers(){

const users=await fetch(API+"/users").then(res=>res.json())

document.getElementById("total-users").innerText=users.length

const tbody=document.querySelector("#activityTable tbody")

tbody.innerHTML=""

document.querySelector("#activityTable thead").innerHTML=`

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
</tr>

`

users.forEach(u=>{

tbody.innerHTML+=`

<tr>

<td>${u.id}</td>
<td>${u.name}</td>
<td>${u.email}</td>
<td>${u.phone}</td>

</tr>

`

})

}



async function loadAssignedCouriers(){

const couriers=await fetch(API+"/couriers/all").then(res=>res.json())

const assigned=couriers.filter(c=>c.staff!=null)

document.getElementById("pending-couriers").innerText=assigned.length

const tbody=document.querySelector("#activityTable tbody")

tbody.innerHTML=""

document.querySelector("#activityTable thead").innerHTML=`

<tr>
<th>Tracking</th>
<th>Sender</th>
<th>Receiver</th>
<th>Source</th>
<th>Assigned Staff</th>
</tr>

`

assigned.forEach(c=>{

tbody.innerHTML+=`

<tr>

<td>${c.trackingNumber}</td>
<td>${c.sender?c.sender.name:"N/A"}</td>
<td>${c.receiverName}</td>
<td>${c.sourceAddress}</td>
<td>${c.staff.name}</td>

</tr>

`

})

}



async function loadBookedCouriers(){

const couriers=await fetch(API+"/couriers/all").then(res=>res.json())

const booked=couriers.filter(c=>c.staff==null)

document.getElementById("inprogress-couriers").innerText=booked.length

const tbody=document.querySelector("#activityTable tbody")

tbody.innerHTML=""

document.querySelector("#activityTable thead").innerHTML=`

<tr>
<th>Tracking</th>
<th>Sender</th>
<th>Receiver</th>
<th>Source</th>
<th>Destination</th>
</tr>

`

booked.forEach(c=>{

tbody.innerHTML+=`

<tr>

<td>${c.trackingNumber}</td>
<td>${c.sender?c.sender.name:"N/A"}</td>
<td>${c.receiverName}</td>
<td>${c.sourceAddress}</td>
<td>${c.destinationAddress}</td>

</tr>

`

})

}



window.onload=loadDashboard

</script>

</body>
</html>
