<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<nav class="navbar navbar-light bg-light mb-4">
  <a class="navbar-brand" href="index.html">CourierMS Admin</a>
</nav>

<div class="container">
  <h3>Settings</h3>
  <form class="mt-3" id="settings-form">
    <div class="mb-3">
      <label class="form-label">Admin Name</label>
      <input type="text" class="form-control" id="admin-name" value="Admin User">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="admin-email" value="admin@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Change Password</label>
      <input type="password" class="form-control" id="admin-password">
    </div>
    <button type="submit" class="btn btn-primary">Save Settings</button>
  </form>
</div>

<script>
  const form=document.getElementById("settings-form");
  form.addEventListener("submit", function(e){
    e.preventDefault();
    alert("Settings saved (API integration pending)");
  });
</script>

</body>
</html>
