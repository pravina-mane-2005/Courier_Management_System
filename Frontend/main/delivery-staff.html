<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Staff Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}
/* Sidebar */

.sidebar{
    width:240px;
    background:#0d6efd;
    color:white;
    min-height:100vh;
    padding:20px;
    box-shadow:2px 0 8px rgba(0,0,0,0.1);
}

.sidebar h4{
    margin-bottom:30px;
    font-weight:700;       /* Bold heading */
    font-size:22px;        /* Increase size of heading */
}

.sidebar a{
    display:block;
    color:white;
    padding:10px 12px;
    text-decoration:none;
    border-radius:6px;
    margin-bottom:8px;
    transition:0.3s;
    font-size:16px;        /* Bigger text for links */
    font-weight:600;       /* Bold links */
}

.sidebar a:hover{
    background:#0b5ed7;
}

.sidebar .active{
    background:#084298;
}

.main{
flex:1;
padding:30px;
}

.card-box{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="d-flex">

<!-- Sidebar -->

<div class="sidebar">

<h4>Admin Panel</h4>

<a href="dashboard.html">Dashboard</a>
<a href="user-management.html">Users</a>
<a href="courier-management.html">Courier Management</a>
<a href="courier-tracking.html">Courier Tracking</a>
<a href="#" class="active">Staff</a>
<a href="payements.html">Payments</a>

</div>

<!-- Main Content -->

<div class="main">

<div class="card-box">

<div class="d-flex justify-content-between align-items-center">

<h3>Delivery Staff</h3>

<button class="btn btn-primary" onclick="openAddModal()">
Add Staff
</button>

</div>

<table class="table table-bordered table-hover mt-3">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Vehicle Number</th>
<th>Area</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="staffTable">

<tr>
<td colspan="7">Loading...</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>


<!-- Staff Modal -->

<div class="modal fade" id="staffModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 id="modalTitle">Add Staff</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input type="hidden" id="staffId">

<input type="text" id="name" class="form-control mb-2" placeholder="Enter Name">

<input type="text" id="phone" class="form-control mb-2" placeholder="Enter Phone">

<input type="text" id="vehicleNumber" class="form-control mb-2" placeholder="Enter Vehicle Number">

<input type="text" id="area" class="form-control mb-2" placeholder="Enter Area">

<input type="text" id="status" class="form-control mb-2" placeholder="Enter Status">

</div>

<div class="modal-footer">

<button class="btn btn-success" onclick="saveStaff()">Save</button>

</div>

</div>

</div>

</div>


<script>

const API = "http://localhost:8085/api/staff";

loadStaff();

function loadStaff(){

fetch(API)

.then(res => res.json())

.then(data => {

let table = document.getElementById("staffTable");

table.innerHTML="";

if(data.length===0){
table.innerHTML="<tr><td colspan='7'>No Staff Found</td></tr>";
return;
}

data.forEach(staff => {

table.innerHTML += `

<tr>

<td>${staff.id}</td>
<td>${staff.name}</td>
<td>${staff.phone}</td>
<td>${staff.vehicleNumber}</td>
<td>${staff.area}</td>
<td>${staff.status}</td>

<td>

<button class="btn btn-warning btn-sm"
onclick="editStaff(${staff.id},'${staff.name}','${staff.phone}','${staff.vehicleNumber}','${staff.area}','${staff.status}')">
Edit
</button>

<button class="btn btn-danger btn-sm"
onclick="deleteStaff(${staff.id})">
Delete
</button>

</td>

</tr>

`;

});

});

}


function openAddModal(){

document.getElementById("modalTitle").innerText="Add Staff";

document.getElementById("staffId").value="";
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("vehicleNumber").value="";
document.getElementById("area").value="";
document.getElementById("status").value="";

var modal=new bootstrap.Modal(document.getElementById("staffModal"));
modal.show();

}


function editStaff(id,name,phone,vehicle,area,status){

document.getElementById("modalTitle").innerText="Edit Staff";

document.getElementById("staffId").value=id;
document.getElementById("name").value=name;
document.getElementById("phone").value=phone;
document.getElementById("vehicleNumber").value=vehicle;
document.getElementById("area").value=area;
document.getElementById("status").value=status;

var modal=new bootstrap.Modal(document.getElementById("staffModal"));
modal.show();

}

function saveStaff(){

let id=document.getElementById("staffId").value;

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let vehicleNumber=document.getElementById("vehicleNumber").value;
let area=document.getElementById("area").value;
let status=document.getElementById("status").value;

let method = id ? "PUT" : "POST";
let url = id ? API + "/" + id : API;

fetch(url,{
method:method,
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
phone:phone,
vehicleNumber:vehicleNumber,
area:area,
status:status
})
})

.then(res=>{
if(!res.ok){
throw new Error("Request failed");
}
return res.json();
})

.then(data=>{
alert("Saved Successfully");
loadStaff();
})

.catch(err=>{
console.error(err);
alert("Error saving staff");
});

}

function deleteStaff(id){

if(!confirm("Delete this staff?")) return;

fetch(API+"/"+id,{
method:"DELETE"
})

.then(res=>{
if(!res.ok){
throw new Error("Delete failed");
}
return res.text();
})

.then(data=>{
alert("Staff Deleted Successfully");
loadStaff();
})

.catch(err=>{
console.error(err);
alert("Delete failed");
});

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
