<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Courier</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
  .dashboard { display: flex; min-height: 100vh; }
  .sidebar { width: 250px; background-color: #0d6efd; color: #fff; padding: 2rem 1rem; }
  .sidebar h4 { color: #fff; margin-bottom: 2rem; }
  .sidebar .nav-link { color: #cce5ff; margin-bottom: 0.5rem; font-weight: 500; }
  .sidebar .nav-link.active, .sidebar .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.2); border-radius: 5px; }
  .content { flex: 1; padding: 2rem; }

  /* Form card */
  .card-form { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
  .card-form h3 { margin-bottom: 1.5rem; }
  .form-control { border-radius: 8px; padding: 0.75rem; }
  .btn-primary { background-color: #0d6efd; border-radius: 8px; font-weight: 600; padding: 0.5rem 1.5rem; }
  .btn-primary:hover { background-color: #0b5ed7; }

  /* Alerts */
  .alert { border-radius: 8px; padding: 0.75rem 1rem; font-weight: 500; }

  /* Responsive */
  @media (max-width: 768px) {
    .dashboard { flex-direction: column; }
    .sidebar { width: 100%; }
    .card-form { width: 90%; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h4>Customer Panel</h4>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="my-couriers.html">My Couriers</a></li>
      <li class="nav-item"><a class="nav-link" href="track-courier.html">Track Courier</a></li>
      <li class="nav-item"><a class="nav-link active" href="book-courier.html">Book Courier</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="card-form">
      <h3>Book a Courier</h3>
      <form id="book-courier-form">
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Receiver Name" id="receiverName" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Receiver Phone" id="receiverPhone" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Source Address" id="sourceAddress" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Destination Address" id="destinationAddress" required>
        </div>
        <div class="mb-3">
          <input type="number" class="form-control" placeholder="Weight (kg)" id="weight" required>
        </div>
        <div class="mb-3">
          <input type="number" class="form-control" placeholder="Price" id="price" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Latest Location" id="latestLocation" required>
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Courier Type (Normal / Express)" id="courierType" required>
        </div>
        <button type="submit" class="btn btn-primary">Book Courier</button>
      </form>
      <div id="booking-msg" class="mt-3"></div>
    </div>
  </div>

</div>

<script>
const customerId = localStorage.getItem("userId");
const bookingMsg = document.getElementById("booking-msg");

if(!customerId){
    alert("Please login first");
    window.location.href="login.html";
}

document.getElementById("book-courier-form").addEventListener("submit", function(e){
  e.preventDefault();

  const courierData = {
    sender:{ id: customerId },
    receiverName: document.getElementById("receiverName").value,
    receiverPhone: document.getElementById("receiverPhone").value,
    sourceAddress: document.getElementById("sourceAddress").value,
    destinationAddress: document.getElementById("destinationAddress").value,
    weight: parseFloat(document.getElementById("weight").value),
    price: parseFloat(document.getElementById("price").value),
    latestLocation : document.getElementById("latestLocation").value ,
    courierType: document.getElementById("courierType").value
  };

  fetch("http://localhost:8085/api/couriers/book",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(courierData)
  })
  .then(res => res.json())
  .then(data => {
    bookingMsg.innerHTML = "<div class='alert alert-success'>Courier Booked Successfully</div>";
    document.getElementById("book-courier-form").reset();
  })
  .catch(error => {
    bookingMsg.innerHTML = "<div class='alert alert-danger'>Booking Failed</div>";
  });
});
</script>

</body>
</html>
