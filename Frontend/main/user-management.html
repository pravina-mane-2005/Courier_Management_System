<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;

}

/* Sidebar */

.sidebar{
width:240px;
background:#0d6efd;
color:white;
min-height:100vh;
padding:20px;
box-shadow:2px 0 8px rgba(0,0,0,0.1);
}

.sidebar h4{
margin-bottom:30px;
font-weight:600;
}

.sidebar a{
display:block;
color:white;
padding:10px 12px;
text-decoration:none;
border-radius:6px;
margin-bottom:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#0b5ed7;
}

.sidebar .active{
background:#084298;
}

/* Main content */

.main{
flex:1;
padding:30px;
}

.card-box{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

table{
margin-top:10px;
}

.actions button{
margin-right:5px;
}

</style>

</head>

<body>

<div class="d-flex">

<!-- Sidebar -->

<div class="sidebar">

<h4>Admin Panel</h4>

<a href="dashboard.html">Dashboard</a>
<a href="user-management.html" class="active">Users</a>
<a href="courier-management.html">Courier Management</a>
<a href="courier-tracking.html">Courier Tracking</a>
<a href="delivery-staff.html">Staff</a>
<a href="payements.html">Payments</a>

</div>

<!-- Main -->

<div class="main">

<div class="card-box">

<h3 class="mb-4">Users Management</h3>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Role</th>
</tr>

</thead>

<tbody id="users-table">

<tr>
<td colspan="6">Loading...</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

const baseURL = "http://localhost:8085/api/users";

// Fetch users
function loadUsers(){

fetch(baseURL)

.then(res=>res.json())

.then(users=>{

const tbody=document.getElementById("users-table");

tbody.innerHTML="";

if(users.length===0){

tbody.innerHTML="<tr><td colspan='6'>No users found</td></tr>";
return;

}

users.forEach(u=>{

tbody.innerHTML+=`

<tr>

<td>${u.id}</td>

<td>${u.name}</td>

<td>${u.email}</td>

<td>${u.phone}</td>

<td>${u.role ? u.role.roleName : ''}</td>



</tr>

`;

});

})

.catch(err=>{

document.getElementById("users-table").innerHTML =
"<tr><td colspan='6'>Error loading data</td></tr>";

});

}


// Delete user
function deleteUser(id){

if(confirm("Are you sure you want to delete this user?")){

fetch(`http://localhost:8085/api/users/${id}`,{
method:"DELETE"
})

.then(res=>res.text())

.then(msg=>{
alert(msg);
loadUsers();
})

.catch(err=>alert("Delete failed"));

}

}

loadUsers();

</script>

</body>
</html>
