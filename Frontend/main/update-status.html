<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Courier Status</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f0f2f5;
margin:0;
}

.d-flex{
min-height:100vh;
}

.sidebar{
width:240px;
background:#0d6efd;
color:white;
padding:20px;
}

.sidebar h4{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
border-radius:6px;
margin-bottom:8px;
}

.sidebar a:hover{
background:#0b5ed7;
}

.sidebar .active{
background:#084298;
}

.content{
flex:1;
padding:40px;
}

.card{
max-width:500px;
margin:auto;
}

</style>
</head>

<body>

<div class="d-flex">

<!-- Sidebar -->

<div class="sidebar">

<h4>Staff Panel</h4>

<a href="assigned-couriers.html">Assigned Couriers</a>
<a class="active" href="update-status.html">Update Status</a>
<a href="delivery-history.html">Delivery History</a>

</div>


<!-- Main Content -->

<div class="content">

<h3 class="mb-4">Update Courier Status</h3>

<div class="card p-4 shadow">

<div class="mb-3">
<label class="form-label">Tracking Number</label>
<input type="text" id="trackingNumber" class="form-control" placeholder="Enter Tracking Number">
</div>

<div class="mb-3">
<label class="form-label">Status</label>
<select id="status" class="form-control">
<option value="In Progress">In Progress</option>
<option value="Delivered">Delivered</option>
</select>
</div>

<button class="btn btn-primary w-100" onclick="updateStatus()">
Update Status
</button>

<p id="msg" class="mt-3 text-center"></p>

</div>

</div>

</div>


<script>

function updateStatus(){

const tracking=document.getElementById("trackingNumber").value;
const status=document.getElementById("status").value;

fetch("http://localhost:8085/api/couriers/tracking/update",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

courier:{
trackingNumber:tracking
},

status:status

})

})

.then(res=>res.json())

.then(data=>{

document.getElementById("msg").innerHTML=
"<span class='text-success'>Status Updated Successfully</span>";

document.getElementById("trackingNumber").value="";

})

.catch(err=>{

console.error(err);

document.getElementById("msg").innerHTML=
"<span class='text-danger'>Error Updating Status</span>";

});

}

</script>

</body>
</html>
