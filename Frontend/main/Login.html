<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courier Management Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
    font-family: 'Poppins', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}
.login-card {
    display: flex;
    width: 900px;
    max-width: 95%;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
.login-left {
    flex: 1;
    padding: 50px;
}
.login-left h2 {
    margin-bottom: 25px;
    color: #333;
}
.login-left input[type=email], .login-left input[type=password] {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}
.login-left input[type=submit] {
    width: 100%;
    padding: 12px;
    background-color: #4facfe;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}
.login-left input[type=submit]:hover {
    background-color: #2f80ed;
}
.login-left .links {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-top: 10px;
}
.login-left .error-message {
    color: red;
    margin-bottom: 15px;
    text-align: center;
}
.login-right {
    flex: 1;
    background: #e6f7ff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px;
    text-align: center;
}
.login-right img {
    max-width: 150px;
    margin-bottom: 20px;
}
.login-right h3 {
    margin-bottom: 10px;
    color: #333;
}
.login-right p {
    font-size: 14px;
    color: #666;
}
.social-buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
}
.social-buttons button {
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    color: white;
}
.google { background: #db4437; }
.facebook { background: #4267B2; }
.twitter { background: #1DA1F2; }

/* Responsive */
@media (max-width: 800px){
    .login-card { flex-direction: column; }
    .login-left, .login-right { width: 100%; padding: 30px; }
    .login-right { order: -1; }
}
</style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Left Form -->
        <div class="login-left">
            <h2>Courier Management Login</h2>
            <p id="error" class="error-message"></p>
            <form onsubmit="login(event)">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <div class="links">
                    <label><input type="checkbox" id="remember"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <input type="submit" value="Sign In">
            </form>
        </div>

        <!-- Right Illustration -->
        <div class="login-right">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="Courier Illustration">
            <h3>Welcome Back!</h3>
            <p>Sign in to access your Courier Management System.</p>
            <div class="social-buttons">
                <a href="https://accounts.google.com/signin" target="_blank">
                    <button class="google">Google</button>
                </a>
                <a href="https://www.facebook.com/login.php" target="_blank">
                    <button class="facebook">Facebook</button>
                </a>
               <a href="https://twitter.com/login" target="_blank">
                    <button class="twitter">Twitter</button>
                </a>
            </div>
        </div>

    </div>
</div>

<script>
function login(event){
    event.preventDefault();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if(!email || !password){
        document.getElementById("error").innerText = "Please fill all fields";
        return;
    }

    fetch("http://localhost:8085/api/users/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email,password})
    })
    .then(res => res.json())
    .then(user => {
        if(user && user.role){
            localStorage.setItem("userId",user.id);
            localStorage.setItem("role",user.role.roleName);
            window.location="index.html";
        } else {
            document.getElementById("error").innerText="Invalid Email or Password";
        }
    })
    .catch(err => {
        document.getElementById("error").innerText="Server Error";
    });
}
</script>

</body>
</html>
